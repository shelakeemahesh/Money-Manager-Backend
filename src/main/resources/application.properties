# ========================
# SERVER
# ========================
server.port=${PORT:8080}
server.servlet.context-path=/api/v1.0
# Render needs the app to bind to 0.0.0.0 (not just localhost)
server.address=0.0.0.0

# ========================
# DATASOURCE (PostgreSQL)
# ========================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/moneymanager}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool — tuned for Render free-tier (limited connections)
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:5}
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
# Eagerly initialize the pool at startup instead of lazily on first query
spring.datasource.hikari.initialization-fail-timeout=0

# ========================
# JPA / HIBERNATE
# ========================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true
spring.data.redis.repositories.enabled=false
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
# Disable SQL logging in production (override in application-dev.properties)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ========================
# JWT
# ========================
# IMPORTANT: Set APP_JWT_SECRET in production! The default below is for local development ONLY.
# Use a strong, random 256-bit+ key in production (e.g. openssl rand -base64 64).
app.jwt.secret=${APP_JWT_SECRET:dev-only-fallback-secret-key-change-me-in-production-min-32-chars!!}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:604800000}

# ========================
# CORS
# ========================
# Set APP_CORS_ALLOWED_ORIGINS in production (comma-separated list).
# The default value covers local development only.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:3000}

# ========================
# APP
# ========================
app.base-url=${APP_BASE_URL:http://localhost:8080/api/v1.0}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}

# ========================
# MAIL (Brevo / SMTP)
# ========================
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_USERNAME}
spring.mail.password=${BREVO_PASSWORD}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.from=${BREVO_FROM_EMAIL:shelakemahesh024@gmail.com}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Disable Redis cache (no Redis instance on free tier)
spring.cache.type=none

# ========================
# LOGGING (production)
# ========================
# Root level INFO — no DEBUG/TRACE SQL in production
logging.level.root=INFO
logging.level.in.maheshshelakee.moneymanager=INFO
# Suppress noisy Hibernate startup logs
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.deprecation=ERROR

# ========================
# STARTUP OPTIMISATION
# ========================
# Disable JMX (not useful in containers/Render)
spring.jmx.enabled=false
# Lazy-init beans that aren't needed at startup (faster boot)
spring.main.lazy-initialization=true

# ========================
# ACTUATOR
# ========================
management.endpoints.web.exposure.include=health,metrics

# ========================
# BACKUP & RETENTION
# ========================
app.backup.local-dir=backups

# ========================
# CLOUDINARY CONFIG
# ========================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:your_cloud_name}
cloudinary.api-key=${CLOUDINARY_API_KEY:your_api_key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:your_api_secret}

# ========================
# TWILIO SMS CONFIG
# ========================
twilio.account-sid=${TWILIO_ACCOUNT_SID:your_account_sid_here}
twilio.auth-token=${TWILIO_AUTH_TOKEN:your_auth_token_here}
twilio.phone-number=${TWILIO_PHONE_NUMBER:your_twilio_phone_number_here}






